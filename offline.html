<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hors connexion — Complexe Santa Lucia</title>
<style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
         min-height:100vh;display:flex;align-items:center;justify-content:center;
         background:linear-gradient(135deg,#1d54a0 0%,#e91e63 100%);color:#fff;text-align:center;padding:24px;}
    .box{max-width:420px;}
    .emoji{font-size:64px;margin-bottom:10px;}
    h1{font-size:24px;margin:0 0 10px;}
    p{font-size:15px;line-height:1.6;opacity:.92;margin:0 0 22px;}
    button{border:none;border-radius:24px;background:#fff;color:#e91e63;font-weight:700;
           font-size:15px;padding:13px 28px;cursor:pointer;}
</style>
</head>
<body>
<div class="box">
    <div class="emoji">📡</div>
    <h1>Vous êtes hors connexion</h1>
    <p>Impossible de joindre Santa Lucia pour le moment.
       Vérifiez votre connexion internet, puis réessayez —
       nos bons plans vous attendent.</p>
    <button onclick="location.reload()">Réessayer</button>
</div>
</body>
</html>
