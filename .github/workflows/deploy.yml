name: Déploiement FTP (code custom Santa Lucia)

# Déploiement automatique à chaque push sur main.
# Possibilité de lancer manuellement depuis l'onglet Actions (workflow_dispatch).
on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: ftp-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'

      - name: Vérifier la syntaxe PHP (lint) — bloque le déploiement si erreur
        run: |
          ERR=0
          while IFS= read -r f; do
            if ! php -l "$f" > /tmp/lint.txt 2>&1; then
              echo "::error file=$f::Erreur de syntaxe PHP"
              cat /tmp/lint.txt
              ERR=1
            fi
          done < <(find wp-content -name '*.php')
          if [ "$ERR" -ne 0 ]; then
            echo "Déploiement annulé : au moins un fichier PHP a une erreur de syntaxe."
            exit 1
          fi
          echo "Tous les fichiers PHP sont valides."

      - name: Déployer sur le serveur via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          # On envoie l'arborescence du repo (wp-content/...) vers la racine web.
          local-dir: ./
          server-dir: /
          # Ne jamais envoyer ces éléments (méta du repo + sauvegardes éventuelles).
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/*.md
            **/docs/**
            **/*.bak*
            **/*.codex-*
            **/.ftp-deploy-sync-state.json

# NOTE Varnish : un JS/CSS modifié garde le même nom => Varnish ressert l'ancien.
# Pour ces fichiers, renommer (ex: bons-plans-v3.css -> v4.css) + mettre à jour l'enqueue,
# ou déclencher une purge côté serveur. Le déploiement FTP seul ne purge pas Varnish.
